services:
  stock-dashboard:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stock-dashboard
    restart: unless-stopped
    environment:
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
    ports:
      - "8000:8000"
    networks:
      - devnet

networks:
  devnet:
    external: true
